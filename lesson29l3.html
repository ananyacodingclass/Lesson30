<!DOCTYPE html>
<html>
<head>
    <title>JavaScript</title>
</head>
<body>
    <button onclick="myfunction()">Try!</button>
    <p id="result"></p>
    <script>
        function myfunction(){
            var x = 15
            var y = 20
            var a = eval("x + y") + "<br>";
            var b = eval("3 * 3") + "<br>";
            var c = eval("y - x") + "<br>";
            var res = a + b + c; 
            document.getElementById("result").innerHTML = res;
        }
    </script>
</body>
</html>
